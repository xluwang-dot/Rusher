# Rusher Rust 开发环境配置

[general]
log_level = "debug"
log_file = ""
daemon = false

[dns]
listen_addr = "127.0.0.1:5353"  # 开发环境使用非特权端口
cache_ttl = 60
enable_ipv6 = false
upstream_dns = ["8.8.8.8:53"]

[scanner]
scan_interval = 60  # 开发环境缩短扫描间隔
scan_timeout = 5
max_concurrent = 10  # 开发环境减少并发数
retry_count = 2
connect_timeout = 3
request_timeout = 5
incremental_scan = true
incremental_interval = 30
max_ips_per_cidr = 5

[github]
meta_url = "https://api.github.com/meta"
domains = [
    "github.com",
    "github.global.ssl.fastly.net",
    "raw.githubusercontent.com"
]
custom_ranges = []
api_auth_enabled = false
api_token = ""

[http]
user_agent = "Rusher-Rust/Dev"
connection_pool_size = 20
http2_enabled = true
compression_enabled = true
proxy = ""

[cache]
scan_cache_size = 100
dns_cache_size = 50
cache_expiry = 600

[monitoring]
enabled = true
port = 9091
path = "/metrics"
health_check = true